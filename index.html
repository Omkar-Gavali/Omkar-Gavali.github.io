<!DOCTYPE html>
<html>
<head>
  <title>Hii Aasawari</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0; /* Background color */
    }
    
    h1 {
      font-size: 36px;
      animation: flash 2s infinite;
    }

    @keyframes flash {
      0% {
        color: red;
      }
      50% {
        color: blue;
      }
      100% {
        color: red;
      }
    }
  </style>
</head>
<body>
  <h1>Flashing Title</h1>
</body>
</html>
