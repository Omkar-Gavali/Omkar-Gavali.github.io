<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Index</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 0;
      margin: 0;
      background: linear-gradient(to bottom, #00bcd4, #00796b);
      overflow: hidden;
    }
    #globe {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: spin 20s linear infinite;
    }
    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      background-color: #f44336;
      color: white;
      border: none;
      border-radius: 5px;
    }
    #counter {
      font-size: 24px;
      margin-top: 20px;
      color: white;
    }
  </style>
</head>
<body>
  <h1>Dynamic Counter Example</h1>
  <button id="incrementButton">Increment Counter</button>
  <div id="counter">Counter: <span id="count">0</span></div>
  <img id="globe" src="Omkar-Gavali.github.io/sherlock-holmes-benedict-cumberbatch-sherlock-tv-wallpaper-preview.jpg" alt="Revolving Globe">
  
  <script>
    const incrementButton = document.getElementById('incrementButton');
    const countElement = document.getElementById('count');
    let count = 0;
    
    incrementButton.addEventListener('click', () => {
      count++;
      countElement.textContent = count;
    });
  </script>
</body>
</html>
