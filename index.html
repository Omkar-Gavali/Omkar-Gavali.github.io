<!DOCTYPE html>
<html>
<head>
  <title>Omkar's Space</title>
 
    <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0; /* Background color */
    }
    
    h1 {
      font-size: 36px;
      animation: flash 2s infinite;
      transition: transform 0.2s;
      cursor: pointer;
    }

    @keyframes flash {
      0% {
        color: red;
        transform: scale(1);
      }
      50% {
        color: blue;
        transform: scale(1.2);
      }
      100% {
        color: red;
        transform: scale(1);
      }
    }

    h1:hover {
      transform: rotate(360deg);
    }
  </style>
</head>
<body>
  <h1>Hiii Aasawariii</h1>
</body>
</html>
