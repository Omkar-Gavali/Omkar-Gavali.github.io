<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Index</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }
    #counter {
      font-size: 24px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Dynamic Counter Example</h1>
  <button id="incrementButton">Increment Counter</button>
  <div id="counter">Counter: <span id="count">0</span></div>
  
  <script>
    const incrementButton = document.getElementById('incrementButton');
    const countElement = document.getElementById('count');
    let count = 0;
    
    incrementButton.addEventListener('click', () => {
      count++;
      countElement.textContent = count;
    });
  </script>
</body>
</html>
